name: Facebook atomizer deduplication

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: facebook-rta-editorial-series
  cancel-in-progress: false

jobs:
  deduplicate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate publisher and duplicate plan
        run: |
          node --check tools/facebook-publisher.js
          node tools/check-facebook-publisher.js
          node tools/facebook-publisher.js --check-dedupe-posts

      - name: Remove repeated atomizer posts
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
        run: node tools/facebook-publisher.js --dedupe-posts

      - name: Commit deduplicated state
        shell: bash
        run: |
          if git diff --quiet -- data/facebook-campaign-state.json data/facebook-publish-state.json; then
            echo "No duplicate state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-campaign-state.json data/facebook-publish-state.json
          git commit -m "Remove repeated Facebook atomizer posts"
          git pull --rebase
          git push

      - name: Publish one unique replacement within daily limit
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
        run: node tools/facebook-publisher.js --publish-editorial --max-posts 1

      - name: Commit replacement state
        shell: bash
        run: |
          if git diff --quiet -- data/facebook-campaign-state.json; then
            echo "No replacement was due under the daily limit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-campaign-state.json
          git commit -m "Record unique Facebook atomizer replacement"
          git pull --rebase
          git push
