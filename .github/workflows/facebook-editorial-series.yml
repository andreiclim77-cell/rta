name: Facebook RTA editorial series

on:
  workflow_dispatch:
  schedule:
    # Two posts/day. The publisher enforces the Romania daily limit even when GitHub starts late.
    - cron: "5 7 * * *"
    - cron: "5 16 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: facebook-rta-editorial-series
  cancel-in-progress: false

jobs:
  publish:
    if: vars.FACEBOOK_AUTOPUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate editorial publisher
        run: |
          node --check tools/facebook-publisher.js
          node tools/check-facebook-publisher.js
          node tools/facebook-publisher.js --check-editorial --max-posts 1

      - name: Detect remaining editorial posts
        id: pending
        shell: bash
        run: |
          echo "count=$(node tools/facebook-publisher.js --editorial-pending-count --max-posts 1)" >> "$GITHUB_OUTPUT"
          echo "remaining=$(node tools/facebook-publisher.js --editorial-unposted-count)" >> "$GITHUB_OUTPUT"

      - name: Publish one verified atomizer
        if: steps.pending.outputs.count != '0'
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
        run: node tools/facebook-publisher.js --publish-editorial --max-posts 1

      - name: Commit editorial state
        if: steps.pending.outputs.count != '0'
        shell: bash
        run: |
          if git diff --quiet -- data/facebook-campaign-state.json; then
            echo "No editorial state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-campaign-state.json
          git commit -m "Record Facebook editorial post"
          git pull --rebase
          git push

      - name: Stop completed editorial series
        if: steps.pending.outputs.remaining == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method PUT "repos/${{ github.repository }}/actions/workflows/facebook-editorial-series.yml/disable"

      - name: Report queued editorial models
        if: steps.pending.outputs.count == '0' && steps.pending.outputs.remaining != '0'
        run: echo "${{ steps.pending.outputs.remaining }} atomizer(s) remain queued; the Romanian daily limit may already be complete."
