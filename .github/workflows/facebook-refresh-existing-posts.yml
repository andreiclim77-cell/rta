name: Facebook add high-end mods to existing posts

on:
  workflow_dispatch:
    inputs:
      model:
        description: Optional atomizer slug to refresh
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: facebook-refresh-existing-posts
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Facebook publisher
        env:
          TARGET_MODEL: ${{ inputs.model }}
        run: |
          node --check tools/facebook-publisher.js
          node tools/check-facebook-publisher.js
          node tools/facebook-publisher.js --check-repair-legacy-post-galleries --model "$TARGET_MODEL"

      - name: Refresh existing Facebook posts
        id: refresh_posts
        continue-on-error: true
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
          TARGET_MODEL: ${{ inputs.model }}
        run: node tools/facebook-publisher.js --repair-legacy-post-galleries --model "$TARGET_MODEL"

      - name: Commit refreshed Facebook state
        if: always()
        shell: bash
        run: |
          if git diff --quiet -- data/facebook-campaign-state.json data/facebook-publish-state.json; then
            echo "No Facebook state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-campaign-state.json data/facebook-publish-state.json
          git commit -m "Record Facebook high-end mod migration"
          git pull --rebase
          git push

      - name: Report Facebook migration failure
        if: steps.refresh_posts.outcome == 'failure'
        run: |
          echo "Facebook migration stopped after preserving all completed post updates." >&2
          exit 1
