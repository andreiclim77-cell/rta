name: Repair today's Facebook liquid details

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: facebook-rta-editorial-series
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Facebook liquid pairing
        run: |
          node --check tools/facebook-publisher.js
          node tools/check-facebook-publisher.js
          node tools/facebook-publisher.js --check-repair-today-liquids

      - name: Update today's Facebook messages
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
        run: node tools/facebook-publisher.js --repair-today-liquids

      - name: Commit updated Facebook state
        shell: bash
        run: |
          if git diff --quiet -- data/facebook-publish-state.json; then
            echo "No Facebook state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-publish-state.json
          git commit -m "Record visible Facebook liquid details"
          git pull --rebase
          git push
