name: Facebook repair public visibility

on:
  workflow_dispatch:
    inputs:
      model:
        description: Optional atomizer slug for a controlled repair
        required: false
        default: ''
        type: string
      max_posts:
        description: Maximum posts to repair in this run
        required: true
        default: '1'
        type: string

permissions:
  contents: write

concurrency:
  group: facebook-rta-editorial-series
  cancel-in-progress: false

jobs:
  repair:
    if: vars.FACEBOOK_AUTOPUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Facebook publisher
        run: |
          node --check tools/facebook-publisher.js
          node tools/check-facebook-publisher.js

      - name: Replace private application posts
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
        run: >-
          node tools/facebook-publisher.js --repair-visibility
          --max-posts "${{ inputs.max_posts }}"
          ${{ inputs.model != '' && format('--model "{0}"', inputs.model) || '' }}

      - name: Commit repaired Facebook state
        shell: bash
        run: |
          if git diff --quiet -- data/facebook-campaign-state.json data/facebook-publish-state.json; then
            echo "No Facebook state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-campaign-state.json data/facebook-publish-state.json
          git commit -m "Repair Facebook post visibility"
          git pull --rebase
          git push
