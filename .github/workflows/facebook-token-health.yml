name: Facebook token health

on:
  workflow_dispatch:
  schedule:
    # Daily at 05:40 Romania time, covering EEST and EET.
    - cron: "40 2,3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Confirm Bucharest health window
        id: window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=Europe/Bucharest date +%H)" = "05" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=Europe/Bucharest date +%u)" = "7" ]; then
            echo "weekly=true" >> "$GITHUB_OUTPUT"
          else
            echo "weekly=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.window.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.window.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify Facebook Page identity
        if: steps.window.outputs.run == 'true'
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
        run: node tools/facebook-publisher.js --verify-credentials

      - name: Verify publish permission weekly
        if: steps.window.outputs.run == 'true' && steps.window.outputs.weekly == 'true'
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
        run: node tools/facebook-publisher.js --verify-publish-capability

      - name: Open or update Facebook token alert
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Automatizare] Tokenul Facebook necesita verificare';
            const { data } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const existing = data.find(issue => issue.title === title);
            const body = `Verificarea automata a tokenului Facebook a esuat. Consultati rularea GitHub Actions ${context.runId}. Tokenurile nu sunt incluse in jurnal.`;
            if (existing) await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            else await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });

      - name: Close resolved Facebook token alert
        if: success() && steps.window.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Automatizare] Tokenul Facebook necesita verificare';
            const { data } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            for (const issue of data.filter(item => item.title === title)) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, state: 'closed' });
            }
