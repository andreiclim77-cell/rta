name: Facebook visible notice update

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: facebook-visible-notice-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate visible notice
        run: |
          node --check tools/facebook-publisher.js
          node tools/check-facebook-publisher.js
          node tools/facebook-publisher.js --check-repair-zero-nicotine-galleries

      - name: Update existing Facebook posts
        id: update
        continue-on-error: true
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: node tools/facebook-publisher.js --repair-zero-nicotine-galleries

      - name: Record confirmed updates
        if: always()
        shell: bash
        run: |
          if git diff --quiet -- data/facebook-publish-state.json data/facebook-campaign-state.json; then
            echo "No Facebook state change to record."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-publish-state.json data/facebook-campaign-state.json
          git commit -m "Record updated Facebook base rules"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report an incomplete update
        if: steps.update.outcome == 'failure'
        run: |
          echo "At least one Facebook notice update failed. Confirmed earlier changes were preserved."
          exit 1
