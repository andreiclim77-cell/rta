name: Submit URLs to IndexNow

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "*.html"
      - "sitemap.xml"
      - "robots.txt"
      - "llms.txt"
      - "assets/**"
      - "atomizoare/**"
      - "lichide/**"
      - "en/**"
      - "data/**"
      - "sync-status.json"
      - "site.webmanifest"
      - "site-en.webmanifest"
      - "sw.js"
      - "tools/submit-indexnow.js"
  schedule:
    - cron: "45 3 * * *"
    - cron: "45 4 * * *"

permissions:
  contents: read

jobs:
  submit-indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Gate daily schedule to 06:45 Bucharest
        id: window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=Europe/Bucharest date +%H:%M)" = "06:45" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.window.outputs.run == 'true'
        uses: actions/checkout@v4
      - if: steps.window.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Wait for Pages to publish fresh files
        if: steps.window.outputs.run == 'true' && github.event_name == 'push'
        run: sleep 120
      - name: Submit sitemap URLs
        if: steps.window.outputs.run == 'true'
        run: node tools/submit-indexnow.js
