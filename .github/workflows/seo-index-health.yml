name: SEO and index health

on:
  workflow_dispatch:
  schedule:
    # Sunday at 07:15 Romania time, covering EEST and EET.
    - cron: "15 4,5 * * 0"

permissions:
  contents: write
  issues: write

concurrency:
  group: seo-index-health
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Confirm Bucharest monitoring window
        id: window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=Europe/Bucharest date +%H)" = "07" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.window.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        if: steps.window.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate local SEO structure
        if: steps.window.outputs.run == 'true'
        run: node tools/validate-seo-pages.js

      - name: Inspect public sitemap URLs
        if: steps.window.outputs.run == 'true'
        id: live
        continue-on-error: true
        run: node tools/check-live-index-health.js --write

      - name: Submit current sitemap to IndexNow
        if: steps.window.outputs.run == 'true'
        run: node tools/submit-indexnow.js

      - name: Store index health report
        if: always() && steps.window.outputs.run == 'true'
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- data/indexing-health.json)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/indexing-health.json
          git commit -m "Update public index health"
          git pull --rebase
          git push

      - name: Open or update indexing alert
        if: steps.live.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Automatizare] Verificarea publica SEO necesita atentie';
            const { data } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const existing = data.find(issue => issue.title === title);
            const body = `Una sau mai multe adrese din sitemap nu au raspuns corect ori au canonical diferit. Consultati rularea ${context.runId} si data/indexing-health.json.`;
            if (existing) await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            else await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });

      - name: Close resolved indexing alert
        if: steps.live.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Automatizare] Verificarea publica SEO necesita atentie';
            const { data } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            for (const issue of data.filter(item => item.title === title)) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, state: 'closed' });
            }

      - name: Fail after preserving the report
        if: steps.live.outcome == 'failure'
        run: exit 1
