name: Smokee RTA Sync

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-smokee-rta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Smokee RTA products
        run: node tools/sync-smokee-rta.js --write

      - name: Commit catalog update
        run: |
          if git diff --quiet -- index.html; then
            echo "No new Smokee RTA products."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Sync Smokee RTA catalog"
            git push
          fi
