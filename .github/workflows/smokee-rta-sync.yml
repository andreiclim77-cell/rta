name: Smokee Catalog Sync

on:
  schedule:
    # Daily catalog sync at 06:00 and 06:20 Romania time.
    # GitHub cron uses UTC, so both EEST and EET offsets are scheduled; the job gates on Bucharest local hour.
    - cron: '0,20 3 * * *'
    - cron: '0,20 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smokee-catalog-sync
  cancel-in-progress: true

jobs:
  sync-smokee-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Confirm Bucharest sync window
        id: sync_window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_sync=true" >> "$GITHUB_OUTPUT"
            echo "Manual run allowed."
            exit 0
          fi

          local_time="$(TZ=Europe/Bucharest date +%H:%M)"
          local_hour="${local_time%:*}"
          if [ "$local_hour" = "06" ]; then
            echo "run_sync=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled run allowed at Bucharest time $local_time."
          else
            echo "run_sync=false" >> "$GITHUB_OUTPUT"
            echo "Skipped outside Bucharest 06:00-06:59 window. Current Bucharest time: $local_time."
          fi

      - name: Checkout
        if: steps.sync_window.outputs.run_sync == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: steps.sync_window.outputs.run_sync == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Smokee RTA products
        if: steps.sync_window.outputs.run_sync == 'true'
        run: node tools/sync-smokee-rta.js --write

      - name: Check Smokee RTA consumables
        if: steps.sync_window.outputs.run_sync == 'true'
        run: node tools/sync-smokee-consumables.js --write

      - name: Check Smokee liquids
        if: steps.sync_window.outputs.run_sync == 'true'
        run: node tools/sync-smokee-liquids.js --write

      - name: Route product images through Cloudflare cache
        if: steps.sync_window.outputs.run_sync == 'true'
        run: node tools/rewrite-smokee-images.js --write

      - name: Refresh exact YouTube reviews and builds
        if: steps.sync_window.outputs.run_sync == 'true'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node tools/sync-youtube-reviews.js --write

      - name: Refresh validation, catalog pages and sync status
        if: steps.sync_window.outputs.run_sync == 'true'
        run: |
          node tools/generate-atomizer-validation.js
          node tools/generate-catalog-pages.js
          node tools/write-sync-status.js --source-sync
          node tools/generate-localized-app.js

      - name: Validate catalog and generated pages
        if: steps.sync_window.outputs.run_sync == 'true'
        run: |
          node tools/validate-app-js.js
          node tools/check-catalog-integrity.js
          node tools/check-youtube-review-data.js
          node tools/check-facebook-publisher.js
          node tools/facebook-publisher.js --check
          node tools/validate-seo-pages.js

      - name: Commit catalog update
        if: steps.sync_window.outputs.run_sync == 'true'
        run: |
          if git diff --quiet; then
            echo "No Smokee catalog changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html sync-status.json sitemap.xml llms.txt en data atomizoare lichide
            git commit -m "Sync Smokee catalog"
            git pull --rebase
            git push
          fi

      - name: Detect Facebook updates
        if: steps.sync_window.outputs.run_sync == 'true'
        id: facebook_updates
        shell: bash
        run: |
          pending="$(node tools/facebook-publisher.js --pending-count)"
          echo "count=$pending" >> "$GITHUB_OUTPUT"
          echo "Facebook pending posts: $pending"

      - name: Publish real Facebook Page updates
        if: steps.sync_window.outputs.run_sync == 'true' && steps.facebook_updates.outputs.count != '0'
        id: facebook_publish
        continue-on-error: true
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_VERSION: ${{ vars.FACEBOOK_GRAPH_VERSION || 'v25.0' }}
        run: node tools/facebook-publisher.js --publish --max-posts 4

      - name: Commit Facebook publish state
        if: always() && steps.sync_window.outputs.run_sync == 'true' && steps.facebook_updates.outputs.count != '0'
        shell: bash
        run: |
          if git diff --quiet -- data/facebook-publish-state.json; then
            echo "No Facebook state changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/facebook-publish-state.json
            git commit -m "Record Facebook catalog updates"
            git pull --rebase
            git push
          fi

      - name: Report Facebook publishing failure
        if: steps.facebook_publish.outcome == 'failure'
        shell: bash
        run: |
          echo "Facebook publishing failed after preserving every successful post ID." >&2
          exit 1
