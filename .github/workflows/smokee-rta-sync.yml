name: Smokee Catalog Sync

on:
  schedule:
    # GitHub scheduled workflows are independent of Codex/local sessions.
    # Five minutes is the practical public GitHub cron floor; the page itself also checks live every 2 minutes while open.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smokee-catalog-sync
  cancel-in-progress: true

jobs:
  sync-smokee-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Smokee RTA products
        run: node tools/sync-smokee-rta.js --write

      - name: Check Smokee RTA consumables
        run: node tools/sync-smokee-consumables.js --write

      - name: Check Smokee liquids
        run: node tools/sync-smokee-liquids.js --write

      - name: Commit catalog update
        run: |
          if git diff --quiet -- index.html; then
            echo "No Smokee catalog changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Sync Smokee catalog"
            git pull --rebase
            git push
          fi
