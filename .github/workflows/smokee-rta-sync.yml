name: Smokee Catalog Sync

on:
  schedule:
    # GitHub cron uses UTC. The guard below runs sync only during 06:00-06:59 Romania.
    # Several off-peak attempts are used because scheduled GitHub runs can be delayed or dropped.
    - cron: '7,17,27,37,47,57 3 * * *'
    - cron: '7,17,27,37,47,57 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smokee-catalog-sync
  cancel-in-progress: false

jobs:
  sync-smokee-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Keep 06:00 Romania sync window
        id: sync-window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run accepted."
            exit 0
          fi
          hour="$(TZ=Europe/Bucharest date +%H)"
          if [ "$hour" = "06" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Smokee sync accepted for $(TZ=Europe/Bucharest date)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipped outside 06:00 Romania window: $(TZ=Europe/Bucharest date)."
          fi

      - name: Check Smokee RTA products
        if: steps.sync-window.outputs.run == 'true'
        run: node tools/sync-smokee-rta.js --write

      - name: Check Smokee RTA consumables
        if: steps.sync-window.outputs.run == 'true'
        run: node tools/sync-smokee-consumables.js --write

      - name: Check Smokee liquids
        if: steps.sync-window.outputs.run == 'true'
        run: node tools/sync-smokee-liquids.js --write

      - name: Commit catalog update
        if: steps.sync-window.outputs.run == 'true'
        run: |
          if git diff --quiet -- index.html; then
            echo "No Smokee catalog changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Sync Smokee catalog"
            git pull --rebase
            git push
          fi
