name = "ghid-rta-smokee-sync-backup"
main = "worker.mjs"
compatibility_date = "2026-07-04"
workers_dev = true
routes = [
  { pattern = "ghid-rta.ro/__smokee-sync-backup*", zone_name = "ghid-rta.ro" },
  { pattern = "ghid-rta.ro/media/smokee/*", zone_name = "ghid-rta.ro" }
]

[triggers]
crons = [
  "0,20 3 * * *",
  "0,20 4 * * *"
]

[vars]
GITHUB_OWNER = "andreiclim77-cell"
GITHUB_REPO = "rta"
GITHUB_WORKFLOW = "smokee-rta-sync.yml"
GITHUB_REF = "main"

[[kv_namespaces]]
binding = "RTA_METRICS"
id = "5d3abc9ae882498ea83129ed0b59c546"
